syntax = "proto3";

package chatto.clientsync.v1;

import "google/protobuf/timestamp.proto";

option go_package = "hmans.de/chatto/internal/pb/chatto/clientsync/v1;clientsyncv1";

// TimeFormat controls how times are displayed across the user's Chatto clients.
enum TimeFormat {
  TIME_FORMAT_UNSPECIFIED = 0;
  TIME_FORMAT_12_HOUR = 1;
  TIME_FORMAT_24_HOUR = 2;
}

// Preferences is the persisted, latest-value document for personal settings
// which should follow a user between Chatto clients.
message Preferences {
  // BCP 47 locale tag, such as en-GB or de.
  optional string locale = 1;
  // IANA timezone name. Empty or absent means to use the client timezone.
  optional string timezone = 2;
  // Preferred time display format.
  optional TimeFormat time_format = 3;
}

// KnownServer describes one server in the user's portable server directory.
// Authentication credentials deliberately never belong in this record.
message KnownServer {
  // Opaque identifier within this portable directory. It is not global server
  // identity and need not match a client's local routing identifier.
  string id = 1;
  // Canonical HTTP or HTTPS origin for the server.
  string url = 2;
  // Last discovered display name.
  string name = 3;
  // Last discovered server icon URL.
  optional string icon_url = 4;
  // Time this entry was first added to the directory.
  google.protobuf.Timestamp added_at = 5;
}

// ServerDirectory is the persisted, latest-value document containing the
// user's known servers and the server designated as their home.
message ServerDirectory {
  // Servers known to the user, without authentication credentials.
  repeated KnownServer servers = 1;
  // ID of the server designated as home.
  optional string home_server_id = 2;
}
