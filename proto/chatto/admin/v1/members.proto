syntax = "proto3";

package chatto.admin.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/users.proto";
import "chatto/api/v1/pagination.proto";
import "google/protobuf/timestamp.proto";

// User row returned by server-admin member management reads.
//
// The embedded user record carries public identity fields; remaining fields are
// admin/member metadata with visibility controlled by the service.
message AdminMember {
  reserved 1 to 4;
  reserved "id", "login", "display_name", "avatar_url";

  // Explicit server role assignments. The implicit everyone role is omitted.
  repeated string roles = 5;
  // Account creation time, when known.
  google.protobuf.Timestamp created_at = 6;
  reserved 7;
  reserved "deleted";
  // Whether the caller may see that the user has a verified email and one exists.
  bool has_verified_email = 8;
  // Verified email addresses visible to the caller.
  repeated string verified_emails = 9;
  // Whether the caller may delete this account.
  bool viewer_can_delete_account = 10;
  // Last self-service username change, when visible and known.
  google.protobuf.Timestamp last_login_change = 11;
  // Public identity fields for this user.
  chatto.api.v1.User user = 12;
}

// Role reference used by member list filters and badges.
message AdminRoleReference {
  // Stable role name.
  string name = 1;
  // Display name shown in admin UI.
  string display_name = 2;
}

// Server role details used by the member detail role-assignment UI.
message AdminMemberRole {
  // Stable role name.
  string name = 1;
  // Display name shown in admin UI.
  string display_name = 2;
  // Display/order position.
  int32 position = 3;
  // Server permissions granted by this role.
  repeated string permissions = 4;
  // Server permissions denied by this role.
  repeated string permission_denials = 5;
}

// Request to create a user as an admin or operator action.
message CreateUserRequest {
  // Required login for the new user.
  string login = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  // Optional display name. Defaults to login when empty.
  string display_name = 2 [(buf.validate.field).string.max_len = 80];
  // Optional password. When present, it must satisfy server password policy.
  string password = 3 [(buf.validate.field).string.max_len = 128];
  // Optional email to add as already verified.
  string verified_email = 4 [(buf.validate.field).string.max_len = 320];
  // Optional explicit server roles to assign after creation.
  repeated string role_names = 5 [(buf.validate.field).repeated.max_items = 20];
}

// Result of creating a user.
message CreateUserResponse {
  // Created admin member row.
  AdminMember member = 1;
}

// Request server-admin member rows.
message ListMembersRequest {
  reserved 2, 3;
  reserved "limit", "offset";

  // Case-insensitive login/display-name search term. Empty disables search.
  string search = 1;
  // Page request. Defaults to 20 results when absent or limit is zero.
  chatto.api.v1.PageRequest page = 4;
}

// Server-admin member rows plus role summaries.
message ListMembersResponse {
  reserved 3, 4;
  reserved "total_count", "has_more";

  // Matching users.
  repeated AdminMember users = 1;
  // Server roles for display-name lookup.
  repeated AdminRoleReference roles = 2;
  // Page metadata.
  chatto.api.v1.PageInfo page = 5;
}

// Request one server-admin member detail record.
message GetMemberRequest {
  // Target user ID.
  string user_id = 1;
  // Target login. Provide either user_id or login.
  string login = 2;
}

// Server-admin member detail payload.
message GetMemberResponse {
  // Member record.
  AdminMember member = 1;
  // Server roles for assignment UI.
  repeated AdminMemberRole roles = 2;
  // Server permissions available for per-user overrides.
  repeated string available_permissions = 3;
  // Whether the caller may assign/revoke roles.
  bool viewer_can_assign_roles = 4;
  // Whether the caller may edit role definitions.
  bool viewer_can_manage_roles = 5;
  // Whether the caller may edit direct user permissions.
  bool viewer_can_manage_user_permissions = 6;
}

// Request to assign a server role to a user.
message AssignRoleRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Role name to assign.
  string role_name = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of assigning a server role.
message AssignRoleResponse {
  // True when the request completed.
  bool assigned = 1;
  // Updated admin member row.
  AdminMember member = 2;
}

// Request to revoke a server role from a user.
message RevokeRoleRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Role name to revoke.
  string role_name = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of revoking a server role.
message RevokeRoleResponse {
  // True when the request completed.
  bool revoked = 1;
  // Updated admin member row.
  AdminMember member = 2;
}

// Request to update a user's identity as a server-admin action.
message UpdateUserRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // New display name, when changing it.
  optional string display_name = 2;
  // New login identifier, when changing it.
  optional string login = 3;
}

// Result of an admin user update.
message UpdateUserResponse {
  // Updated user profile.
  chatto.api.v1.User user = 1;
  // Updated admin member row.
  AdminMember member = 2;
}

// Request to set a user's password as an admin or operator action.
message SetUserPasswordRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // New password.
  string password = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

// Result of setting a user's password.
message SetUserPasswordResponse {
  // Updated admin member row.
  AdminMember member = 1;
}

// Request to permanently delete a user account.
message DeleteUserRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of deleting a user account.
message DeleteUserResponse {
  // True when the account was deleted.
  bool deleted = 1;
}

// Request to add a verified email address to a user.
message AddVerifiedEmailRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Email address to mark as verified.
  string email = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 320
  }];
}

// Result of adding a verified email address.
message AddVerifiedEmailResponse {
  // Updated admin member row.
  AdminMember member = 1;
}

// Request to clear a user's self-service username-change cooldown.
message ClearUsernameCooldownRequest {
  // Target user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of clearing a user's username-change cooldown.
message ClearUsernameCooldownResponse {
  // True when the request completed.
  bool cleared = 1;
}

// Server-admin user identity and cooldown commands.
//
// On the public web listener, these RPCs use normal user authentication and
// RBAC checks. On the dedicated Admin API listener, configured operator tokens
// may call the same RPCs from allowed CIDRs as Chatto's system actor.
service AdminMemberService {
  // Creates a user as an authenticated admin or local operator.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  // Lists server members for the admin members screen.
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  // Gets one server member plus role/permission metadata for admin details.
  // Returns NOT_FOUND when the user does not exist.
  rpc GetMember(GetMemberRequest) returns (GetMemberResponse);
  // Assigns a server role to a user.
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  // Revokes a server role from a user.
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
  // Updates a user's login and/or display name as an admin action.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  // Sets a user's password as an authenticated admin or local operator.
  rpc SetUserPassword(SetUserPasswordRequest) returns (SetUserPasswordResponse);
  // Permanently deletes a user account.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  // Adds an already-verified email address to a user.
  rpc AddVerifiedEmail(AddVerifiedEmailRequest) returns (AddVerifiedEmailResponse);
  // Clears the target user's self-service username-change cooldown.
  rpc ClearUsernameCooldown(ClearUsernameCooldownRequest) returns (ClearUsernameCooldownResponse);
}
