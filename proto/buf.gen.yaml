version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: hmans.de/chatto/internal/pb
plugins:
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-go"]
    out: ../cli/internal/pb
    opt:
      - paths=source_relative
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-connect-go"]
    out: ../cli/internal/pb
    opt:
      - paths=source_relative
  - local: ../apps/frontend/node_modules/.bin/protoc-gen-es
    out: ../apps/frontend/src/lib/pb
    opt:
      - target=ts
    types:
      - chatto.app.v1
      - chatto.realtime.v1
  - local: ../apps/frontend/node_modules/.bin/protoc-gen-connect-es
    out: ../apps/frontend/src/lib/pb
    opt:
      - target=ts
    types:
      - chatto.app.v1
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../apps/docs-website/src/content/docs/reference
    strategy: all
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,app-connectrpc-api.mdx
    types:
      - chatto.app.v1
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../apps/docs-website/src/content/docs/reference
    strategy: all
    opt:
      - ../proto/templates/protobuf-reference-starlight.md.tmpl,realtime-protocol.mdx
    types:
      - chatto.realtime.v1
