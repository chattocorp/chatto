port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  # Discover the public IP through STUN when the container is behind NAT.
  # For a stable, known public IP, set this to false and configure node_ip.
  use_external_ip: true
  # node_ip: 203.0.113.10

turn:
  enabled: true
  udp_port: 3478

keys:
  # Must match CHATTO_LIVEKIT_API_KEY / CHATTO_LIVEKIT_API_SECRET in .env
  your-api-key: replace-with-at-least-32-character-livekit-secret

webhook:
  urls:
    - https://chat.example.com/webhooks/livekit
  api_key: your-api-key

logging:
  level: info
