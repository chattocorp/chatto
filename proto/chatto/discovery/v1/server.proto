syntax = "proto3";

package chatto.discovery.v1;

import "chatto/api/v1/server.proto";
import "google/protobuf/descriptor.proto";

// Request for public server metadata.
message GetServerRequest {}

// ServerFeatures reports optional server functionality which a client can
// consider before authentication. A false or absent field means the feature
// must not be used.
message ServerFeatures {
  // Whether this server accepts authenticated client-sync data and can be
  // selected as a home server.
  bool client_sync = 1;
}

// Public metadata clients need before they can authenticate or render the
// initial server view.
message GetServerResponse {
  // Public server profile and branding.
  chatto.api.v1.ServerPublicProfile profile = 1;
  // Login and registration options.
  chatto.api.v1.ServerLogin login = 2;
  // Optional functionality enabled by this server's operator.
  ServerFeatures features = 3;
}

// Provides unauthenticated server discovery metadata.
service ServerDiscoveryService {
  // Returns public server metadata, branding, registration status, and login
  // provider information. This fully public RPC is available before login so
  // clients can render the first server screen and authentication choices.
  rpc GetServer(GetServerRequest) returns (GetServerResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}
