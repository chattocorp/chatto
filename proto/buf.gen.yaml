version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: hmans.de/chatto/internal/pb
plugins:
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-go"]
    out: ../cli/internal/pb
    opt:
      - paths=source_relative
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-connect-go"]
    out: ../cli/internal/pb
    opt:
      - paths=source_relative
  - local: ../packages/api-types/node_modules/.bin/protoc-gen-es
    out: ../packages/api-types/src
    opt:
      - target=ts
    types:
      - chatto.api.v1
  - local: ../packages/api-types/node_modules/.bin/protoc-gen-connect-es
    out: ../packages/api-types/src
    opt:
      - target=ts
    types:
      - chatto.api.v1
  - local: ["go", "tool", "-C", "../cli", "protoc-gen-doc"]
    out: ../apps/docs-website/src/generated/connectrpc-api
    opt:
      - ../proto/templates/connectrpc-starlight.md.tmpl,index.raw.mdx
    types:
      - chatto.api.v1
