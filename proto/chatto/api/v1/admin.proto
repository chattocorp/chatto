syntax = "proto3";

package chatto.api.v1;

import "buf/validate/validate.proto";
import "chatto/api/v1/pagination.proto";
import "google/protobuf/timestamp.proto";

// Verified email address attached to an administrative user view.
message AdminVerifiedEmail {
  // Verified email address.
  string email = 1;
  // When the email address was verified.
  google.protobuf.Timestamp verified_at = 2;
}

// User record returned by the operator-only AdminService.
message AdminUser {
  // Stable user ID.
  string user_id = 1;
  // Login name used for password sign-in and mentions.
  string login = 2;
  // Display name shown in clients.
  string display_name = 3;
  // When the account was created, if known.
  google.protobuf.Timestamp created_at = 4;
  // Explicit server roles assigned to the user. The implicit "everyone" role
  // is not included.
  repeated string role_names = 5;
  // Verified email addresses attached to this user.
  repeated AdminVerifiedEmail verified_emails = 6;
}

// Request to list users for operator administration.
message ListAdminUsersRequest {
  reserved 2, 3;
  reserved "limit", "offset";

  // Optional case-insensitive substring filter for login or display name.
  string search = 1 [(buf.validate.field).string.max_len = 100];
  // Page request. Defaults to 20 results when absent or limit is zero.
  PageRequest page = 4;
}

// Result of listing users for operator administration.
message ListAdminUsersResponse {
  reserved 2, 3;
  reserved "total_count", "has_more";

  // Users in the requested page.
  repeated AdminUser users = 1;
  // Page metadata.
  PageInfo page = 4;
}

// Request to fetch a single user by ID or login.
message GetAdminUserRequest {
  // User ID to fetch. Provide either user_id or login.
  string user_id = 1;
  // Login to fetch. Provide either user_id or login.
  string login = 2;
}

// Result of fetching a single administrative user view.
message GetAdminUserResponse {
  // Requested user.
  AdminUser user = 1;
}

// Request to create a user as an operator action.
message CreateAdminUserRequest {
  // Required login for the new user.
  string login = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  // Optional display name. Defaults to login when empty.
  string display_name = 2 [(buf.validate.field).string.max_len = 80];
  // Optional password. When present, it must satisfy server password policy.
  string password = 3 [(buf.validate.field).string.max_len = 128];
  // Optional email to add as already verified.
  string verified_email = 4 [(buf.validate.field).string.max_len = 320];
  // Optional explicit server roles to assign after creation.
  repeated string role_names = 5 [(buf.validate.field).repeated.max_items = 20];
}

// Result of creating a user as an operator action.
message CreateAdminUserResponse {
  // Created user.
  AdminUser user = 1;
}

// Request to update a user's editable profile fields.
message UpdateAdminUserRequest {
  // Required user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Optional new login.
  optional string login = 2 [(buf.validate.field).string.max_len = 64];
  // Optional new display name.
  optional string display_name = 3 [(buf.validate.field).string.max_len = 80];
}

// Result of updating a user.
message UpdateAdminUserResponse {
  // Updated user.
  AdminUser user = 1;
}

// Request to set a user's password as an operator action.
message SetAdminUserPasswordRequest {
  // Required user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // New password.
  string password = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

// Result of setting a user's password.
message SetAdminUserPasswordResponse {
  // Updated user.
  AdminUser user = 1;
}

// Request to permanently delete a user account.
message DeleteAdminUserRequest {
  // Required user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
}

// Result of permanently deleting a user account.
message DeleteAdminUserResponse {}

// Request to add a verified email address to a user.
message AddAdminUserVerifiedEmailRequest {
  // Required user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Email address to mark as verified.
  string email = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 320
  }];
}

// Result of adding a verified email address.
message AddAdminUserVerifiedEmailResponse {
  // Updated user.
  AdminUser user = 1;
}

// Request to assign a server role to a user.
message AssignAdminUserRoleRequest {
  // Required user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Role name to assign.
  string role_name = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of assigning a server role.
message AssignAdminUserRoleResponse {
  // Updated user.
  AdminUser user = 1;
}

// Request to revoke a server role from a user.
message RevokeAdminUserRoleRequest {
  // Required user ID.
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  // Role name to revoke.
  string role_name = 2 [(buf.validate.field).string.min_len = 1];
}

// Result of revoking a server role.
message RevokeAdminUserRoleResponse {
  // Updated user.
  AdminUser user = 1;
}

// Operator-only administrative API for user lifecycle and bootstrap tasks.
//
// This service is disabled unless the server operator enables admin_api in
// configuration. It is served only on the dedicated Admin API listener and is
// never mounted on the public web listener. It accepts only configured Admin API
// tokens from each token's allowed CIDR ranges and performs mutations as the
// system actor.
service AdminService {
  // Lists users visible to operator administration.
  rpc ListUsers(ListAdminUsersRequest) returns (ListAdminUsersResponse);
  // Fetches a single user by ID or login.
  rpc GetUser(GetAdminUserRequest) returns (GetAdminUserResponse);
  // Creates a new user, optionally adding a verified email and roles.
  rpc CreateUser(CreateAdminUserRequest) returns (CreateAdminUserResponse);
  // Updates a user's login and/or display name.
  rpc UpdateUser(UpdateAdminUserRequest) returns (UpdateAdminUserResponse);
  // Sets a user's password and revokes existing runtime credentials.
  rpc SetUserPassword(SetAdminUserPasswordRequest) returns (SetAdminUserPasswordResponse);
  // Permanently deletes a user account.
  rpc DeleteUser(DeleteAdminUserRequest) returns (DeleteAdminUserResponse);
  // Adds an already-verified email address to a user.
  rpc AddUserVerifiedEmail(AddAdminUserVerifiedEmailRequest) returns (AddAdminUserVerifiedEmailResponse);
  // Assigns a server role to a user.
  rpc AssignUserRole(AssignAdminUserRoleRequest) returns (AssignAdminUserRoleResponse);
  // Revokes a server role from a user.
  rpc RevokeUserRole(RevokeAdminUserRoleRequest) returns (RevokeAdminUserRoleResponse);
}
